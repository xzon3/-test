<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Xzon3 | Admin Portal</title>
    <style>
        :root { --gold: #d4a843; --bg: #050508; --card: #0d0d14; --text: #f0ede6; --teal: #00e5c8; --rose: #ff4d7e; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; justify-content: center; padding: 50px 20px; }
        .panel { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid rgba(212,168,67,0.2); width: 100%; max-width: 600px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        h2 { color: var(--gold); text-align: center; margin-bottom: 8px; letter-spacing: 2px; text-transform: uppercase; }
        h3 { color: var(--text); font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; margin: 0 0 14px; opacity: 0.7; }
        .section-divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 28px 0 22px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .field { margin-bottom: 15px; }
        label { font-size: 11px; color: #9b96a8; text-transform: uppercase; margin-bottom: 6px; display: block; }
        input { width: 100%; padding: 12px; background: #161620; border: 1px solid #2a2a3a; border-radius: 10px; color: #fff; box-sizing: border-box; transition: 0.3s; font-family: inherit; font-size: 14px; }
        input:focus { border-color: var(--gold); outline: none; }
        button { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; color: #000; transition: 0.3s; font-size: 14px; }
        button:hover { background: #fff; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #output-container { margin-top: 30px; display: none; }
        #output { background: #000; padding: 20px; border-radius: 10px; border: 1px solid #333; font-family: monospace; font-size: 14px; color: var(--gold); white-space: pre-wrap; overflow-x: auto; margin-bottom: 10px; }
        .copy-btn { background: #222; color: #fff; }
        #status-container { margin-top: 20px; display: none; }
        #status-log { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 16px; font-size: 13px; line-height: 1.7; color: var(--text); font-family: monospace; }
        #status-log .ok { color: var(--teal); }
        #status-log .err { color: var(--rose); }
        #status-log .info { color: var(--text); opacity: 0.75; }
        .token-note { background: rgba(212,168,67,0.06); border: 1px solid rgba(212,168,67,0.2); color: #c9c4d6; border-radius: 10px; padding: 12px 16px; font-size: 11.5px; line-height: 1.6; margin-bottom: 16px; }
        .token-note a { color: var(--gold); }
        .checkbox-field { display: flex; align-items: flex-start; }
        .checkbox-label { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; text-transform: none; color: var(--text); cursor: pointer; line-height: 1.5; }
        .checkbox-label input[type="checkbox"] { width: auto; margin-top: 2px; flex-shrink: 0; accent-color: var(--gold); }

        .list-btn { background: #222; color: #fff; }
        #post-list-container { margin-top: 16px; }
        .post-list-group { margin-bottom: 18px; }
        .post-list-group-title { font-size: 11px; color: #9b96a8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .post-row { display: flex; align-items: center; gap: 12px; background: #12121a; border: 1px solid #24242f; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
        .post-row-thumb { width: 46px; height: 46px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: #222; }
        .post-row-info { flex: 1; min-width: 0; }
        .post-row-title { font-size: 13px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .post-row-meta { font-size: 10.5px; color: #8a8596; margin-top: 2px; }
        .row-btn { width: auto; padding: 8px 12px; margin: 0 0 0 6px; font-size: 12px; border-radius: 8px; }
        .row-btn.edit-btn { background: #2a2a3a; color: var(--gold); }
        .row-btn.danger { background: rgba(255,77,126,0.12); color: var(--rose); }
        .edit-banner { display: none; align-items: center; justify-content: space-between; gap: 10px; background: rgba(212,168,67,0.1); border: 1px solid rgba(212,168,67,0.35); border-radius: 10px; padding: 10px 14px; margin-bottom: 16px; font-size: 12.5px; color: var(--gold); }
        .edit-banner button { width: auto; margin: 0; padding: 6px 12px; font-size: 11px; background: transparent; border: 1px solid rgba(212,168,67,0.5); color: var(--gold); }
        .empty-hint { font-size: 12px; color: #7a7588; padding: 8px 0; }
    </style>
</head>
<body>

<div class="panel">
    <h2>Xzon3 Admin</h2>

    <h3>GitHub সংযোগ</h3>
    <div class="token-note">
        টোকেন কোথাও সেভ হয় না — শুধু এই ট্যাব খোলা থাকা পর্যন্ত মেমোরিতে থাকে, পেজ রিলোড দিলে আবার দিতে হবে।
        <a href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener">Fine-grained token বানান</a> —
        শুধু এই রিপোজিটরির জন্য, <b>Contents: Read and write</b> পারমিশন দিয়ে।
    </div>
    <div class="grid">
        <div class="field"><label>Repo Owner</label><input type="text" id="gh-owner" value="xzon3"></div>
        <div class="field"><label>Repo Name</label><input type="text" id="gh-repo" value="test"></div>
        <div class="field"><label>Branch</label><input type="text" id="gh-branch" value="main"></div>
        <div class="field"><label>Personal Access Token</label><input type="password" id="gh-token" placeholder="ghp_... / github_pat_..."></div>
    </div>

    <hr class="section-divider">

    <div id="edit-banner" class="edit-banner">
        <span id="edit-banner-text"></span>
        <button onclick="cancelEdit()">✕ বাতিল করো</button>
    </div>

    <h3>নতুন পোস্ট</h3>
    <div class="field"><label>Title (Optional)</label><input type="text" id="title"></div>
    <div class="grid">
        <div class="field"><label>Image URL</label><input type="text" id="image"></div>
        <div class="field"><label>Target Link</label><input type="text" id="link"></div>
        <div class="field"><label>Task Limit (TMA-এর জন্য; নিচের বক্স টিক দিলেও লাগবে)</label><input type="number" id="tasks"></div>
        <div class="field"><label>Duration</label><input type="text" id="duration" placeholder="e.g. 05:30"></div>
        <div class="field"><label>Upload Date</label><input type="datetime-local" id="uploadDate"></div>
    </div>
    <div class="field checkbox-field">
        <label class="checkbox-label"><input type="checkbox" id="both-mode"> TMA + Web — একই কন্টেন্ট এবং একই আইডি দিয়ে দুটোতেই পোস্ট করো (একটা tma-posts-এ, একটা web-posts-এ)</label>
    </div>

    <button id="push-btn" onclick="pushToGithub()">🚀 Generate &amp; Push to GitHub</button>
    <button class="copy-btn" id="generate-only-btn" onclick="generateOnly()" style="margin-top:10px;">শুধু JSON তৈরি করো (কপি করার জন্য)</button>

    <div id="output-container">
        <label>Generated JSON:</label>
        <div id="output"></div>
        <button class="copy-btn" onclick="copyToClipboard()">Copy JSON to Clipboard</button>
    </div>

    <div id="status-container">
        <label>স্ট্যাটাস:</label>
        <div id="status-log"></div>
    </div>

    <hr class="section-divider">

    <h3>পুরনো পোস্ট ম্যানেজ করো</h3>
    <div class="grid">
        <button class="list-btn" style="margin-top:0;" onclick="loadPostList('tma-posts')">TMA পোস্ট লোড করো</button>
        <button class="list-btn" style="margin-top:0;" onclick="loadPostList('web-posts')">Web পোস্ট লোড করো</button>
    </div>
    <div id="post-list-container"></div>
</div>

<script>
    (function prefillUploadDate() {
        const d = new Date(Date.now() - new Date().getTimezoneOffset() * 60000);
        document.getElementById('uploadDate').value = d.toISOString().slice(0, 16);
    })();

    /* === Edit/Delete state === */
    let _editState = null;              // { dir, id, page } while editing an existing post
    let _loadedPosts = {};               // { 'tma-posts': [...], 'web-posts': [...] } — cached list, each post tagged with _page

    function escapeHTML(str) {
        return String(str == null ? '' : str)
            .replace(/&/g, '&amp;')
            .replace(/"/g, '&quot;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function generateId() {
        let chars = 'abcdefghijklmnopqrstuvwxyz';
        let nums = '0123456789';
        let id = [];
        id.push(nums[Math.floor(Math.random() * nums.length)]);
        id.push(nums[Math.floor(Math.random() * nums.length)]);
        for(let i=0; i<4; i++) {
            let pool = (Math.random() > 0.5) ? chars : nums;
            id.push(pool[Math.floor(Math.random() * pool.length)]);
        }
        return id.sort(() => Math.random() - 0.5).join('');
    }

    /* Builds shared fields once, then returns either one entry (normal mode)
       or two entries — tma-posts + web-posts, using the SAME id for both
       (both mode: same content, same id, two directories). */
    function buildPostObjects() {
        const bothMode = document.getElementById('both-mode').checked;
        const tasksVal = document.getElementById('tasks').value;
        const image = document.getElementById('image').value;
        const targetLink = document.getElementById('link').value;
        const title = document.getElementById('title').value;
        const duration = document.getElementById('duration').value;
        const uploadDateVal = document.getElementById('uploadDate').value;
        const uploadDateISO = uploadDateVal ? new Date(uploadDateVal).toISOString() : null;
        const sharedId = generateId();

        function makeObj(withTasks) {
            let obj = { id: sharedId, image, targetLink };
            if (title) obj.title = title;
            if (withTasks && tasksVal) obj.totalTasks = parseInt(tasksVal);
            if (duration) obj.duration = duration;
            if (uploadDateISO) obj.uploadDate = uploadDateISO;
            return obj;
        }

        if (bothMode) {
            return [
                { obj: makeObj(true), dir: 'tma-posts' },
                { obj: makeObj(false), dir: 'web-posts' }
            ];
        }
        const dir = tasksVal ? 'tma-posts' : 'web-posts';
        return [{ obj: makeObj(!!tasksVal), dir }];
    }

    function showOutput(entries) {
        const parts = entries.map(e => `// ${e.dir}\n` + JSON.stringify(e.obj, null, 2) + ",");
        document.getElementById('output').textContent = parts.join('\n\n');
        document.getElementById('output-container').style.display = 'block';
    }

    function generateOnly() {
        showOutput(buildPostObjects());
    }

    /* === Status log === */
    function resetStatus() {
        const log = document.getElementById('status-log');
        log.innerHTML = '';
        document.getElementById('status-container').style.display = 'block';
    }
    function logStatus(msg, cls) {
        const log = document.getElementById('status-log');
        const line = document.createElement('div');
        line.className = cls || 'info';
        line.textContent = msg;
        log.appendChild(line);
    }

    /* === UTF-8 safe base64 helpers (GitHub Contents API needs base64) === */
    function b64EncodeUnicode(str) {
        return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,
            (match, p1) => String.fromCharCode('0x' + p1)));
    }
    function b64DecodeUnicode(str) {
        return decodeURIComponent(atob(str.replace(/\n/g, '')).split('').map(c =>
            '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
        ).join(''));
    }

    /* === GitHub Contents API === */
    async function ghGetFile(owner, repo, path, branch, token) {
        const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${encodeURIComponent(branch)}`, {
            headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' }
        });
        if (res.status === 404) return null;
        if (!res.ok) throw new Error(`GET ${path} → HTTP ${res.status}: ${(await res.json()).message || res.statusText}`);
        const data = await res.json();
        return { sha: data.sha, content: b64DecodeUnicode(data.content) };
    }

    async function ghPutFile(owner, repo, path, branch, token, content, message, sha) {
        const body = { message, content: b64EncodeUnicode(content), branch };
        if (sha) body.sha = sha;
        const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Accept': 'application/vnd.github+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(`PUT ${path} → HTTP ${res.status}: ${(await res.json()).message || res.statusText}`);
        return res.json();
    }

    async function ghListPosts(owner, repo, branch, token, dir) {
        const manifestFile = await ghGetFile(owner, repo, `${dir}/manifest.json`, branch, token);
        if (!manifestFile) return [];
        const manifest = JSON.parse(manifestFile.content);
        const totalPages = manifest.totalPages || 0;
        let all = [];
        for (let p = 1; p <= totalPages; p++) {
            const pageFile = await ghGetFile(owner, repo, `${dir}/page-${p}.json`, branch, token);
            const posts = pageFile ? JSON.parse(pageFile.content) : [];
            if (Array.isArray(posts)) {
                posts.forEach(post => all.push({ ...post, _page: p }));
            }
        }
        return all;
    }

    /* Pushes a single post object into a single directory's manifest.json + page-N.json.
       Used once (normal mode) or twice back-to-back (both mode). */
    async function pushOneDirectory(owner, repo, branch, token, dir, obj) {
        const tag = `[${dir}]`;
        const manifestPath = `${dir}/manifest.json`;
        logStatus(`⏳ ${tag} ${manifestPath} পড়া হচ্ছে...`, 'info');
        const manifestFile = await ghGetFile(owner, repo, manifestPath, branch, token);
        let manifest = manifestFile ? JSON.parse(manifestFile.content) : { totalPages: 0, pageSize: 20, totalPosts: 0, postPages: {} };
        const pageSize = manifest.pageSize || 20;
        let totalPages = manifest.totalPages || 0;
        const postPages = manifest.postPages || {};

        let targetPage, pageFile, posts, isNewPage;

        if (totalPages === 0) {
            targetPage = 1;
            pageFile = null;
            posts = [];
            isNewPage = true;
        } else {
            targetPage = totalPages;
            const lastPagePath = `${dir}/page-${targetPage}.json`;
            logStatus(`⏳ ${tag} ${lastPagePath} পড়া হচ্ছে...`, 'info');
            pageFile = await ghGetFile(owner, repo, lastPagePath, branch, token);
            posts = pageFile ? JSON.parse(pageFile.content) : [];
            if (!Array.isArray(posts)) posts = [];

            if (posts.length >= pageSize) {
                targetPage = totalPages + 1;
                pageFile = null;
                posts = [];
                isNewPage = true;
            } else {
                isNewPage = false;
            }
        }

        posts.push(obj);
        const pagePath = `${dir}/page-${targetPage}.json`;
        const pageContent = JSON.stringify(posts, null, 2) + '\n';

        logStatus(`⏳ ${tag} ${pagePath}-এ পোস্ট "${obj.id}" যোগ করা হচ্ছে (${posts.length}/${pageSize})...`, 'info');
        await ghPutFile(owner, repo, pagePath, branch, token, pageContent, `Add post ${obj.id} to ${pagePath}`, pageFile ? pageFile.sha : undefined);
        logStatus(`✅ ${tag} ${pagePath} আপডেট হয়েছে।`, 'ok');

        const newTotalPages = isNewPage ? targetPage : totalPages;
        const newTotalPosts = (manifest.totalPosts || 0) + 1;
        const newManifest = {
            totalPages: newTotalPages,
            pageSize,
            totalPosts: newTotalPosts,
            postPages: { ...postPages, [obj.id]: targetPage }
        };
        const manifestContent = JSON.stringify(newManifest, null, 2) + '\n';

        logStatus(`⏳ ${tag} ${manifestPath} আপডেট করা হচ্ছে...`, 'info');
        await ghPutFile(owner, repo, manifestPath, branch, token, manifestContent, `Update manifest for post ${obj.id}`, manifestFile ? manifestFile.sha : undefined);
        logStatus(`✅ ${tag} ${manifestPath} আপডেট হয়েছে।`, 'ok');
        logStatus(`🎉 ${tag} পোস্ট "${obj.id}" পাবলিশ হয়েছে।`, 'ok');
    }

    /* === Load / render post list for management === */
    function getGithubCreds() {
        return {
            owner: document.getElementById('gh-owner').value.trim(),
            repo: document.getElementById('gh-repo').value.trim(),
            branch: document.getElementById('gh-branch').value.trim() || 'main',
            token: document.getElementById('gh-token').value.trim()
        };
    }

    async function loadPostList(dir) {
        const { owner, repo, branch, token } = getGithubCreds();
        if (!owner || !repo || !token) {
            alert('আগে Owner, Repo, আর Token দাও।');
            return;
        }
        const container = document.getElementById('post-list-container');
        container.innerHTML = `<div class="empty-hint">⏳ ${dir} লোড হচ্ছে...</div>`;
        try {
            const posts = await ghListPosts(owner, repo, branch, token, dir);
            _loadedPosts[dir] = posts;
            renderAllLoadedLists();
        } catch (err) {
            console.error(err);
            container.innerHTML = `<div class="empty-hint">❌ লোড ব্যর্থ: ${escapeHTML(err.message)}</div>`;
        }
    }

    function renderAllLoadedLists() {
        const container = document.getElementById('post-list-container');
        const dirs = Object.keys(_loadedPosts);
        if (dirs.length === 0) { container.innerHTML = ''; return; }

        container.innerHTML = dirs.map(dir => {
            const posts = _loadedPosts[dir];
            if (posts.length === 0) {
                return `<div class="post-list-group"><div class="post-list-group-title">${dir} (0)</div><div class="empty-hint">কোনো পোস্ট নেই।</div></div>`;
            }
            const rows = posts.map(p => `
                <div class="post-row">
                    <img class="post-row-thumb" src="${escapeHTML(p.image)}" onerror="this.style.opacity=0.2" />
                    <div class="post-row-info">
                        <div class="post-row-title">${escapeHTML(p.title || '(No title)')}</div>
                        <div class="post-row-meta">ID: ${escapeHTML(p.id)} · Page ${p._page}${p.totalTasks ? ' · Tasks: ' + p.totalTasks : ''}</div>
                    </div>
                    <button class="row-btn edit-btn" data-action="edit" data-dir="${escapeHTML(dir)}" data-id="${escapeHTML(p.id)}">Edit</button>
                    <button class="row-btn danger" data-action="delete" data-dir="${escapeHTML(dir)}" data-id="${escapeHTML(p.id)}">Delete</button>
                </div>
            `).join('');
            return `<div class="post-list-group"><div class="post-list-group-title">${dir} (${posts.length})</div>${rows}</div>`;
        }).join('');
    }

    document.getElementById('post-list-container').addEventListener('click', (e) => {
        const editBtn = e.target.closest('[data-action="edit"]');
        const delBtn = e.target.closest('[data-action="delete"]');
        if (editBtn) startEditPost(editBtn.dataset.dir, editBtn.dataset.id);
        if (delBtn) deletePost(delBtn.dataset.dir, delBtn.dataset.id);
    });

    /* === Edit an existing post: load its fields into the form === */
    function startEditPost(dir, id) {
        const post = (_loadedPosts[dir] || []).find(p => p.id === id);
        if (!post) return;

        _editState = { dir, id, page: post._page };

        document.getElementById('title').value = post.title || '';
        document.getElementById('image').value = post.image || '';
        document.getElementById('link').value = post.targetLink || '';
        document.getElementById('tasks').value = post.totalTasks || '';
        document.getElementById('duration').value = post.duration || '';
        if (post.uploadDate) {
            const d = new Date(post.uploadDate);
            document.getElementById('uploadDate').value = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
        }

        const bothModeEl = document.getElementById('both-mode');
        bothModeEl.checked = false;
        bothModeEl.disabled = true;

        document.getElementById('edit-banner').style.display = 'flex';
        document.getElementById('edit-banner-text').textContent = `✏️ এডিট করছ: "${post.title || id}" (${dir}, ID: ${id})`;
        document.getElementById('push-btn').textContent = '💾 Update Post';
        document.getElementById('generate-only-btn').style.display = 'none';

        document.getElementById('title').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function cancelEdit() {
        _editState = null;
        const bothModeEl = document.getElementById('both-mode');
        bothModeEl.checked = false;
        bothModeEl.disabled = false;
        document.getElementById('edit-banner').style.display = 'none';
        document.getElementById('push-btn').textContent = '🚀 Generate & Push to GitHub';
        document.getElementById('generate-only-btn').style.display = 'block';
        ['title', 'image', 'link', 'tasks', 'duration'].forEach(id => document.getElementById(id).value = '');
    }

    async function saveEditedPost() {
        const { owner, repo, branch, token } = getGithubCreds();
        const { dir, id, page } = _editState;

        resetStatus();
        if (!owner || !repo || !token) {
            logStatus('⚠️ Owner, Repo, আর Token — তিনটাই লাগবে।', 'err');
            return;
        }

        const image = document.getElementById('image').value;
        const targetLink = document.getElementById('link').value;
        if (!image || !targetLink) {
            logStatus('⚠️ Image URL আর Target Link অবশ্যই দিতে হবে।', 'err');
            return;
        }

        const updatedObj = { id, image, targetLink };
        const title = document.getElementById('title').value;
        if (title) updatedObj.title = title;
        const tasksVal = document.getElementById('tasks').value;
        if (dir === 'tma-posts' && tasksVal) updatedObj.totalTasks = parseInt(tasksVal);
        const duration = document.getElementById('duration').value;
        if (duration) updatedObj.duration = duration;
        const uploadDateVal = document.getElementById('uploadDate').value;
        if (uploadDateVal) updatedObj.uploadDate = new Date(uploadDateVal).toISOString();

        showOutput([{ dir, obj: updatedObj }]);

        const pushBtn = document.getElementById('push-btn');
        pushBtn.disabled = true;
        const originalLabel = pushBtn.textContent;
        pushBtn.textContent = 'সেভ হচ্ছে...';

        try {
            const pagePath = `${dir}/page-${page}.json`;
            logStatus(`⏳ [${dir}] ${pagePath} পড়া হচ্ছে...`, 'info');
            const pageFile = await ghGetFile(owner, repo, pagePath, branch, token);
            let posts = pageFile ? JSON.parse(pageFile.content) : [];
            const idx = posts.findIndex(p => p.id === id);
            if (idx === -1) throw new Error(`পোস্ট "${id}" ${pagePath}-এ খুঁজে পাওয়া যায়নি — লিস্ট আবার লোড করে চেষ্টা করো।`);
            posts[idx] = updatedObj;

            const pageContent = JSON.stringify(posts, null, 2) + '\n';
            logStatus(`⏳ [${dir}] ${pagePath} আপডেট করা হচ্ছে...`, 'info');
            await ghPutFile(owner, repo, pagePath, branch, token, pageContent, `Update post ${id} in ${pagePath}`, pageFile.sha);
            logStatus(`✅ [${dir}] পোস্ট "${id}" সফলভাবে আপডেট হয়েছে।`, 'ok');

            if (_loadedPosts[dir]) {
                const cacheIdx = _loadedPosts[dir].findIndex(p => p.id === id);
                if (cacheIdx !== -1) _loadedPosts[dir][cacheIdx] = { ...updatedObj, _page: page };
                renderAllLoadedLists();
            }

            cancelEdit();
        } catch (err) {
            console.error(err);
            logStatus(`❌ ব্যর্থ হয়েছে: ${err.message}`, 'err');
        } finally {
            pushBtn.disabled = false;
            pushBtn.textContent = _editState ? '💾 Update Post' : '🚀 Generate & Push to GitHub';
        }
    }

    /* === Delete an existing post from its page file + manifest === */
    async function deletePost(dir, id) {
        const { owner, repo, branch, token } = getGithubCreds();
        if (!owner || !repo || !token) {
            alert('আগে Owner, Repo, আর Token দাও।');
            return;
        }

        const post = (_loadedPosts[dir] || []).find(p => p.id === id);
        if (!post) return;

        const ok = confirm(`পোস্ট "${post.title || id}" (${dir}) ডিলিট করবে? এটা ফেরানো যাবে না।`);
        if (!ok) return;

        resetStatus();
        try {
            const page = post._page;
            const pagePath = `${dir}/page-${page}.json`;
            logStatus(`⏳ [${dir}] ${pagePath} পড়া হচ্ছে...`, 'info');
            const pageFile = await ghGetFile(owner, repo, pagePath, branch, token);
            let posts = pageFile ? JSON.parse(pageFile.content) : [];
            const idx = posts.findIndex(p => p.id === id);
            if (idx === -1) throw new Error(`পোস্ট "${id}" খুঁজে পাওয়া যায়নি — লিস্ট আবার লোড করো।`);
            posts.splice(idx, 1);

            const pageContent = JSON.stringify(posts, null, 2) + '\n';
            logStatus(`⏳ [${dir}] ${pagePath} থেকে পোস্ট সরানো হচ্ছে...`, 'info');
            await ghPutFile(owner, repo, pagePath, branch, token, pageContent, `Delete post ${id} from ${pagePath}`, pageFile.sha);
            logStatus(`✅ [${dir}] ${pagePath} আপডেট হয়েছে।`, 'ok');

            const manifestPath = `${dir}/manifest.json`;
            logStatus(`⏳ [${dir}] ${manifestPath} পড়া হচ্ছে...`, 'info');
            const manifestFile = await ghGetFile(owner, repo, manifestPath, branch, token);
            let manifest = manifestFile ? JSON.parse(manifestFile.content) : { totalPages: 0, pageSize: 20, totalPosts: 0, postPages: {} };
            const newPostPages = { ...(manifest.postPages || {}) };
            delete newPostPages[id];
            const newManifest = {
                totalPages: manifest.totalPages || 0,
                pageSize: manifest.pageSize || 20,
                totalPosts: Math.max(0, (manifest.totalPosts || 0) - 1),
                postPages: newPostPages
            };
            const manifestContent = JSON.stringify(newManifest, null, 2) + '\n';
            logStatus(`⏳ [${dir}] ${manifestPath} আপডেট করা হচ্ছে...`, 'info');
            await ghPutFile(owner, repo, manifestPath, branch, token, manifestContent, `Remove post ${id} from manifest`, manifestFile ? manifestFile.sha : undefined);
            logStatus(`✅ [${dir}] পোস্ট "${id}" সম্পূর্ণভাবে ডিলিট হয়েছে।`, 'ok');

            _loadedPosts[dir] = (_loadedPosts[dir] || []).filter(p => p.id !== id);
            renderAllLoadedLists();

            if (_editState && _editState.dir === dir && _editState.id === id) cancelEdit();
        } catch (err) {
            console.error(err);
            logStatus(`❌ [${dir}] ডিলিট ব্যর্থ: ${err.message}`, 'err');
        }
    }

    /* === Main flow: generate one or two post objects, push each directory in turn === */
    async function pushToGithub() {
        if (_editState) {
            await saveEditedPost();
            return;
        }

        const owner  = document.getElementById('gh-owner').value.trim();
        const repo   = document.getElementById('gh-repo').value.trim();
        const branch = document.getElementById('gh-branch').value.trim() || 'main';
        const token  = document.getElementById('gh-token').value.trim();
        const bothMode = document.getElementById('both-mode').checked;
        const tasksVal = document.getElementById('tasks').value;

        resetStatus();

        if (!owner || !repo || !token) {
            logStatus('⚠️ Owner, Repo, আর Token — তিনটাই লাগবে।', 'err');
            return;
        }
        if (bothMode && !tasksVal) {
            logStatus('⚠️ উভয় মোডে পোস্ট করতে হলে Task Limit দিতে হবে (TMA কপির জন্য) — খালি রাখলে চলবে না।', 'err');
            return;
        }

        const entries = buildPostObjects();
        if (!entries[0].obj.image || !entries[0].obj.targetLink) {
            logStatus('⚠️ Image URL আর Target Link অবশ্যই দিতে হবে।', 'err');
            return;
        }
        showOutput(entries);

        const pushBtn = document.getElementById('push-btn');
        pushBtn.disabled = true;
        const originalLabel = pushBtn.textContent;
        pushBtn.textContent = 'পুশ হচ্ছে...';

        let anyFail = false;
        for (const entry of entries) {
            try {
                await pushOneDirectory(owner, repo, branch, token, entry.dir, entry.obj);
            } catch (err) {
                anyFail = true;
                console.error(err);
                logStatus(`❌ [${entry.dir}] ব্যর্থ হয়েছে: ${err.message}`, 'err');
            }
        }

        if (anyFail) {
            logStatus('Owner/Repo/Branch ঠিক আছে কিনা, আর টোকেনে এই রিপোর জন্য "Contents: Read and write" পারমিশন আছে কিনা যাচাই করুন।', 'err');
        } else {
            logStatus(`✨ সবগুলো পোস্ট সফলভাবে পাবলিশ হয়েছে। GitHub Pages রিফ্রেশ হতে ১-২ মিনিট লাগতে পারে।`, 'ok');
        }

        pushBtn.disabled = false;
        pushBtn.textContent = originalLabel;
    }

    function copyToClipboard() {
        const text = document.getElementById('output').textContent;
        navigator.clipboard.writeText(text).then(() => alert("Copied to clipboard!"));
    }
</script>
